services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    restart: always
    # Memory limits to prevent OOM issues
    mem_limit: 2g
    memswap_limit: 2g
    # Health check for monitoring
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Persist Next.js image optimization cache
      - nextjs_cache:/app/.next/cache
    networks:
      - external_network
      - test_network

  playwright:
    build:
      context: .
      dockerfile: dockerfile.playwright
    depends_on:
      nextjs:
        condition: service_healthy
    environment:
      - PLAYWRIGHT_BASE_URL=http://nextjs:3000
      - CI=true
    volumes:
      - ./tests:/app/tests
      - ./playwright-report:/app/playwright-report
      - ./playwright.config.ts:/app/playwright.config.ts
    networks:
      - test_network
    profiles:
      - test
      
  caddy:
    image: caddy:2.10.0-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - external_network

networks:
  external_network:
    external: true
  test_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  nextjs_cache:
