version: '3'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    restart: always
    # 如果你的应用需要环境变量，可以使用以下方式添加
    # environment:
    #   - DATABASE_URL=your_database_url
    #   - API_KEY=your_api_key
    # 如果你需要挂载卷，可以使用以下方式
    # volumes:
    #   - ./data:/app/data
